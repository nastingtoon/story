<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Story Text" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Story Text Editor</title>
  <style>
    @font-face {
      font-family: "Shevko";
      src: url("./Shevko-Regular.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --bg: #000;
      --panel: rgba(20,20,20,.88);
      --panel-2: rgba(34,34,34,.94);
      --line: rgba(255,255,255,.14);
      --text: #fff;
      --muted: rgba(255,255,255,.72);
      --accent: #fff;
      --toolbar-h: 60px;
      --bottom-h: 92px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin:0; background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; height:100%; overflow:hidden; }
    body { overscroll-behavior:none; touch-action:none; }
    button, input, textarea, select { font: inherit; }

    .app {
      position: fixed; inset: 0;
      background: #000;
      overflow: hidden;
    }

    .canvas-shell {
      position:absolute; inset:0;
      background:#000;
      display:flex; align-items:center; justify-content:center;
    }

    .story-stage {
      position:relative;
      width:100vw;
      height:100dvh;
      overflow:hidden;
      background:#111 center / cover no-repeat;
      user-select:none;
      touch-action:none;
    }

    .stage-image {
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      pointer-events:none;
      user-select:none;
    }

    .topbar {
      position:absolute;
      top: env(safe-area-inset-top, 0px);
      left:0; right:0;
      height: var(--toolbar-h);
      display:flex; align-items:center; justify-content:space-between;
      padding: 8px 14px;
      z-index:50;
      background: linear-gradient(to bottom, rgba(0,0,0,.4), rgba(0,0,0,0));
      pointer-events:none;
    }

    .topbar > * { pointer-events:auto; }

    .icon-btn, .pill-btn {
      display:inline-flex; align-items:center; justify-content:center;
      border:none; color:#fff;
      background: rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
      border-radius: 999px;
      min-width:42px; height:42px;
      padding:0 14px;
      cursor:pointer;
    }

    .pill-btn.primary { background:#fff; color:#000; border-color:#fff; font-weight:600; }
    .toolbar-group { display:flex; gap:10px; align-items:center; }
    .icon-btn svg { width:20px; height:20px; }

    .bottombar {
      position:absolute;
      left:0; right:0;
      bottom:0;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      display:flex; gap:10px; justify-content:center;
      z-index:50;
      background: linear-gradient(to top, rgba(0,0,0,.58), rgba(0,0,0,0));
      pointer-events:none;
    }
    .bottombar > * { pointer-events:auto; }
    .bottombar .pill-btn {
      min-height:48px;
      background: rgba(0,0,0,.55);
    }

    .hidden-file {
      display:none;
    }

    .empty-state {
      position:absolute; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:12px; text-align:center;
      padding:24px;
      color:#fff;
      z-index:1;
    }

    .empty-state h1 {
      margin:0; font-size:28px; letter-spacing:-0.03em;
    }
    .empty-state p { margin:0; color:var(--muted); max-width:300px; }

    .layer {
      position:absolute;
      top:50%; left:50%;
      transform-origin:center center;
      cursor:grab;
      touch-action:none;
      white-space:pre-wrap;
      text-align:center;
      line-height:1.05;
      padding: .12em .18em;
      min-width: 28px;
      max-width: 92vw;
      word-break: break-word;
      user-select:none;
    }

    .layer.selected::after {
      content:"";
      position:absolute; inset:-10px;
      border:1px dashed rgba(255,255,255,.55);
      border-radius:12px;
      pointer-events:none;
    }

    .layer .text {
      font-family: "Shevko", -apple-system, sans-serif;
      display:inline-block;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,.25));
    }

    .edit-overlay {
      position:absolute; inset:0;
      z-index:80;
      background: rgba(0,0,0,.78);
      backdrop-filter: blur(8px);
      display:none;
    }
    .edit-overlay.active { display:block; }

    .edit-header {
      position:absolute;
      top: env(safe-area-inset-top, 0px);
      left:0; right:0;
      height:var(--toolbar-h);
      padding:8px 14px;
      display:flex; align-items:center; justify-content:space-between;
    }

    .edit-field-wrap {
      position:absolute;
      inset: calc(env(safe-area-inset-top, 0px) + var(--toolbar-h)) 72px calc(var(--bottom-h) + env(safe-area-inset-bottom, 0px) + 18px) 72px;
      display:flex; align-items:center; justify-content:center;
    }

    .edit-field {
      width:100%;
      max-height:100%;
      border:none;
      outline:none;
      resize:none;
      background:transparent;
      color:#fff;
      text-align:center;
      font-family:"Shevko", -apple-system, sans-serif;
      font-size:46px;
      line-height:1.08;
      overflow:auto;
    }

    .edit-field.bg-on {
      background: rgba(0,0,0,.35);
      border-radius: 14px;
      padding: 12px 14px;
    }

    .left-slider {
      position:absolute;
      top:50%;
      left:14px;
      transform:translateY(-50%);
      width:54px;
      height:280px;
      display:flex; align-items:center; justify-content:center;
    }
    .left-slider input[type="range"] {
      width:280px;
      height:54px;
      transform: rotate(-90deg);
      accent-color:#fff;
      background:transparent;
    }

    .right-tools {
      position:absolute;
      top:50%;
      right:14px;
      transform: translateY(-50%);
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .tool-btn {
      width:44px; height:44px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(25,25,25,.88);
      color:#fff;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
    }
    .tool-btn.active {
      background:#fff; color:#000; border-color:#fff;
    }

    .edit-bottom {
      position:absolute;
      left:0; right:0; bottom:0;
      padding: 10px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      display:flex; flex-direction:column; gap:10px;
    }

    .color-row {
      display:flex; gap:10px; overflow-x:auto; padding-bottom:2px;
      scrollbar-width:none;
    }
    .color-row::-webkit-scrollbar { display:none; }

    .color-chip {
      width:32px; height:32px; border-radius:999px; border:none;
      flex:0 0 auto; cursor:pointer;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.18);
    }
    .color-chip.active {
      outline:2px solid #fff; outline-offset:2px;
    }

    .custom-color {
      width:42px; height:32px;
      border:none; background:none; padding:0;
      flex:0 0 auto;
    }

    .toast {
      position:absolute;
      left:50%; bottom: calc(110px + env(safe-area-inset-bottom, 0px));
      transform:translateX(-50%);
      z-index:120;
      background:rgba(20,20,20,.94);
      border:1px solid rgba(255,255,255,.12);
      padding:12px 14px;
      border-radius:14px;
      color:#fff;
      opacity:0; pointer-events:none;
      transition:opacity .25s ease;
    }
    .toast.show { opacity:1; }

    .sr-only {
      position:absolute;
      width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="canvas-shell">
    <div class="story-stage" id="stage">
      <img id="stageImage" class="stage-image" alt="" hidden />
      <div class="empty-state" id="emptyState">
        <h1>Story Text Editor</h1>
        <p>Выбери фото, добавляй текст, двигай, вращай, меняй размер и сохраняй готовую сторис-картинку.</p>
        <button class="pill-btn primary" id="pickImageEmpty">Выбрать фото</button>
      </div>

      <div class="topbar">
        <div class="toolbar-group">
          <button class="icon-btn" id="pickImageTop" aria-label="Выбрать фото">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
          </button>
        </div>
        <div class="toolbar-group">
          <button class="pill-btn" id="saveBtn">Сохранить</button>
        </div>
      </div>

      <div class="bottombar">
        <button class="pill-btn" id="addTextBtn">Добавить текст</button>
        <button class="pill-btn" id="duplicateBtn">Дублировать</button>
        <button class="pill-btn" id="deleteBtn">Удалить</button>
      </div>

      <div class="edit-overlay" id="editOverlay">
        <div class="edit-header">
          <button class="icon-btn" id="cancelEdit" aria-label="Отмена">✕</button>
          <button class="pill-btn primary" id="applyEdit">Готово</button>
        </div>

        <div class="left-slider">
          <label class="sr-only" for="fontSizeRange">Размер текста</label>
          <input id="fontSizeRange" type="range" min="18" max="120" step="1" value="46" />
        </div>

        <div class="right-tools">
          <button class="tool-btn active" id="alignCenterBtn" data-align="center" title="По центру">≡</button>
          <button class="tool-btn" id="alignLeftBtn" data-align="left" title="По левому краю">≣</button>
          <button class="tool-btn" id="alignRightBtn" data-align="right" title="По правому краю">☰</button>
          <button class="tool-btn" id="bgToggleBtn" title="Подложка">A</button>
        </div>

        <div class="edit-field-wrap">
          <textarea id="editField" class="edit-field" placeholder="Введите текст"></textarea>
        </div>

        <div class="edit-bottom">
          <div class="color-row" id="colorRow"></div>
        </div>
      </div>

      <div class="toast" id="toast"></div>
    </div>
  </div>

  <input class="hidden-file" type="file" accept="image/*" id="imagePicker" />
</div>

<script>
(() => {
  const stage = document.getElementById('stage');
  const stageImage = document.getElementById('stageImage');
  const emptyState = document.getElementById('emptyState');
  const imagePicker = document.getElementById('imagePicker');
  const pickImageEmpty = document.getElementById('pickImageEmpty');
  const pickImageTop = document.getElementById('pickImageTop');
  const addTextBtn = document.getElementById('addTextBtn');
  const duplicateBtn = document.getElementById('duplicateBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const saveBtn = document.getElementById('saveBtn');
  const editOverlay = document.getElementById('editOverlay');
  const cancelEdit = document.getElementById('cancelEdit');
  const applyEdit = document.getElementById('applyEdit');
  const editField = document.getElementById('editField');
  const fontSizeRange = document.getElementById('fontSizeRange');
  const colorRow = document.getElementById('colorRow');
  const toast = document.getElementById('toast');
  const bgToggleBtn = document.getElementById('bgToggleBtn');
  const alignLeftBtn = document.getElementById('alignLeftBtn');
  const alignCenterBtn = document.getElementById('alignCenterBtn');
  const alignRightBtn = document.getElementById('alignRightBtn');

  const palette = [
    '#ffffff', '#000000', '#ff3b30', '#ff9500', '#ffcc00',
    '#34c759', '#00c7be', '#32ade6', '#007aff', '#5856d6',
    '#af52de', '#ff2d55', '#ffd60a', '#64d2ff', '#f2f2f7'
  ];

  let backgroundImage = null;
  let selectedId = null;
  let editingId = null;
  let justEndedGesture = false;
  let layers = [];

  function uid() {
    return 'l_' + Math.random().toString(36).slice(2, 10);
  }

  function showToast(text) {
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function stageRect() {
    return stage.getBoundingClientRect();
  }

  function defaultLayer() {
    const r = stageRect();
    return {
      id: uid(),
      text: 'Новый текст',
      x: r.width / 2,
      y: r.height / 2,
      scale: 1,
      rotation: 0,
      color: '#ffffff',
      fontSize: 46,
      align: 'center',
      bg: false
    };
  }

  function createColorRow() {
    colorRow.innerHTML = '';
    palette.forEach(color => {
      const btn = document.createElement('button');
      btn.className = 'color-chip';
      btn.style.background = color;
      btn.dataset.color = color;
      btn.addEventListener('click', () => {
        if (!editingId) return;
        const layer = layers.find(l => l.id === editingId);
        if (!layer) return;
        layer.color = color;
        syncEditorFromLayer(layer);
        render();
      });
      colorRow.appendChild(btn);
    });

    const custom = document.createElement('input');
    custom.type = 'color';
    custom.className = 'custom-color';
    custom.value = '#ffffff';
    custom.addEventListener('input', () => {
      if (!editingId) return;
      const layer = layers.find(l => l.id === editingId);
      if (!layer) return;
      layer.color = custom.value;
      syncEditorFromLayer(layer);
      render();
    });
    colorRow.appendChild(custom);
  }

  function setSelected(id) {
    selectedId = id;
    render();
  }

  function openEditor(id) {
    editingId = id;
    const layer = layers.find(l => l.id === id);
    if (!layer) return;
    syncEditorFromLayer(layer);
    editOverlay.classList.add('active');
    requestAnimationFrame(() => {
      editField.focus();
      editField.select();
    });
  }

  function closeEditor() {
    editOverlay.classList.remove('active');
    editingId = null;
    render();
  }

  function syncEditorFromLayer(layer) {
    editField.value = layer.text;
    editField.style.color = layer.color;
    editField.style.fontSize = layer.fontSize + 'px';
    editField.style.textAlign = layer.align;
    editField.classList.toggle('bg-on', !!layer.bg);
    fontSizeRange.value = layer.fontSize;
    highlightAlignment(layer.align);
    bgToggleBtn.classList.toggle('active', !!layer.bg);

    [...colorRow.querySelectorAll('.color-chip')].forEach(el => {
      el.classList.toggle('active', el.dataset.color.toLowerCase() === layer.color.toLowerCase());
    });
    const custom = colorRow.querySelector('.custom-color');
    if (custom) custom.value = safeColor(layer.color);
  }

  function safeColor(c) {
    try { return c; } catch { return '#ffffff'; }
  }

  function highlightAlignment(align) {
    [alignLeftBtn, alignCenterBtn, alignRightBtn].forEach(btn => {
      btn.classList.toggle('active', btn.dataset.align === align);
    });
  }

  function render() {
    [...stage.querySelectorAll('.layer')].forEach(n => n.remove());
    layers.forEach(layer => {
      const el = document.createElement('div');
      el.className = 'layer' + (layer.id === selectedId ? ' selected' : '');
      el.dataset.id = layer.id;
      el.style.left = layer.x + 'px';
      el.style.top = layer.y + 'px';
      el.style.transform = `translate(-50%, -50%) scale(${layer.scale}) rotate(${layer.rotation}rad)`;
      el.style.textAlign = layer.align;
      el.style.background = layer.bg ? 'rgba(0,0,0,.55)' : 'transparent';
      el.style.borderRadius = layer.bg ? '14px' : '0';
      el.style.color = layer.color;
      el.style.padding = layer.bg ? '.18em .28em' : '.12em .18em';

      const text = document.createElement('div');
      text.className = 'text';
      text.textContent = layer.text || ' ';
      text.style.fontSize = layer.fontSize + 'px';
      text.style.color = layer.color;
      text.style.textAlign = layer.align;

      el.appendChild(text);
      attachLayerEvents(el, layer.id);
      stage.appendChild(el);
    });

    duplicateBtn.style.opacity = selectedId ? '1' : '.45';
    deleteBtn.style.opacity = selectedId ? '1' : '.45';
  }

  function attachLayerEvents(el, id) {
    el.addEventListener('pointerdown', (e) => {
      if (editOverlay.classList.contains('active')) return;
      e.preventDefault();
      setSelected(id);
      startPointerGesture(el, id, e);
    });

    el.addEventListener('dblclick', (e) => {
      e.preventDefault();
      setSelected(id);
      openEditor(id);
    });

    el.addEventListener('click', (e) => {
      e.stopPropagation();
      if (justEndedGesture) return;
      if (selectedId === id) {
        openEditor(id);
      } else {
        setSelected(id);
      }
    });
  }

  const gestureState = {
    pointers: new Map(),
    id: null,
    startLayer: null,
    active: false
  };

  function copyLayerState(layer) {
    return JSON.parse(JSON.stringify(layer));
  }

  function startPointerGesture(el, id, e) {
    const layer = layers.find(l => l.id === id);
    if (!layer) return;
    if (gestureState.id !== id) {
      gestureState.pointers.clear();
      gestureState.id = id;
      gestureState.startLayer = copyLayerState(layer);
    }
    el.setPointerCapture(e.pointerId);
    gestureState.pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
    gestureState.active = true;

    const onMove = (ev) => {
      if (!gestureState.active || gestureState.id !== id) return;
      if (!gestureState.pointers.has(ev.pointerId)) return;
      gestureState.pointers.set(ev.pointerId, {x:ev.clientX, y:ev.clientY});
      updateGesture(id);
    };

    const onEnd = (ev) => {
      if (gestureState.pointers.has(ev.pointerId)) {
        gestureState.pointers.delete(ev.pointerId);
      }
      if (gestureState.pointers.size === 0) {
        gestureState.active = false;
        gestureState.id = null;
        gestureState.startLayer = null;
        justEndedGesture = true;
        setTimeout(() => { justEndedGesture = false; }, 180);
      } else {
        const layer = layers.find(l => l.id === id);
        if (layer) gestureState.startLayer = copyLayerState(layer);
        const first = [...gestureState.pointers.values()][0];
        gestureState.pointers = new Map([[...gestureState.pointers.keys()][0], first]]);
      }
      el.removeEventListener('pointermove', onMove);
      el.removeEventListener('pointerup', onEnd);
      el.removeEventListener('pointercancel', onEnd);
      el.removeEventListener('lostpointercapture', onEnd);
    };

    el.addEventListener('pointermove', onMove);
    el.addEventListener('pointerup', onEnd);
    el.addEventListener('pointercancel', onEnd);
    el.addEventListener('lostpointercapture', onEnd);
  }

  function distance(a, b) {
    return Math.hypot(b.x - a.x, b.y - a.y);
  }
  function angle(a, b) {
    return Math.atan2(b.y - a.y, b.x - a.x);
  }
  function midpoint(a, b) {
    return { x: (a.x + b.x)/2, y: (a.y + b.y)/2 };
  }

  function updateGesture(id) {
    const layer = layers.find(l => l.id === id);
    if (!layer || !gestureState.startLayer) return;
    const pts = [...gestureState.pointers.values()];
    if (pts.length === 1) {
      const cur = pts[0];
      const start = [...gestureState.pointers.values()][0];
      const dx = cur.x - start.x;
      const dy = cur.y - start.y;
      // single pointer uses movement delta from browser event accumulation by storing latest start dynamically
      layer.x += dx;
      layer.y += dy;
      gestureState.pointers = new Map([[...gestureState.pointers.keys()][0], {x:cur.x, y:cur.y}]]);
    } else if (pts.length >= 2) {
      const [p1, p2] = pts;
      if (!gestureState.multiBase) {
        gestureState.multiBase = {
          p1: {...p1}, p2: {...p2},
          dist: distance(p1,p2),
          angle: angle(p1,p2),
          mid: midpoint(p1,p2),
          layer: copyLayerState(layer)
        };
      }
      const base = gestureState.multiBase;
      const curDist = distance(p1,p2);
      const curAngle = angle(p1,p2);
      const curMid = midpoint(p1,p2);

      const scaleFactor = Math.max(0.2, Math.min(8, (curDist / base.dist) * base.layer.scale));
      layer.scale = scaleFactor;
      layer.rotation = base.layer.rotation + (curAngle - base.angle);
      layer.x = base.layer.x + (curMid.x - base.mid.x);
      layer.y = base.layer.y + (curMid.y - base.mid.y);
    }
    render();
  }

  stage.addEventListener('pointerdown', (e) => {
    if (e.target === stage || e.target === stageImage) {
      setSelected(null);
    }
  });

  stage.addEventListener('touchend', () => {
    gestureState.multiBase = null;
  });
  stage.addEventListener('touchcancel', () => {
    gestureState.multiBase = null;
  });

  function addNewLayer() {
    const layer = defaultLayer();
    layers.push(layer);
    setSelected(layer.id);
    render();
    openEditor(layer.id);
  }

  function duplicateSelected() {
    const layer = layers.find(l => l.id === selectedId);
    if (!layer) return;
    const clone = JSON.parse(JSON.stringify(layer));
    clone.id = uid();
    clone.x += 24;
    clone.y += 24;
    layers.push(clone);
    setSelected(clone.id);
    render();
  }

  function deleteSelected() {
    if (!selectedId) return;
    layers = layers.filter(l => l.id !== selectedId);
    selectedId = null;
    render();
  }

  function applyEditorChanges() {
    const layer = layers.find(l => l.id === editingId);
    if (!layer) return;
    layer.text = editField.value.trim() || ' ';
    closeEditor();
  }

  function updateBackground(file) {
    if (!file) return;
    const url = URL.createObjectURL(file);
    backgroundImage = url;
    stageImage.src = url;
    stageImage.hidden = false;
    emptyState.style.display = 'none';
  }

  imagePicker.addEventListener('change', (e) => {
    const file = e.target.files?.[0];
    updateBackground(file);
  });

  [pickImageEmpty, pickImageTop].forEach(btn =>
    btn.addEventListener('click', () => imagePicker.click())
  );

  addTextBtn.addEventListener('click', addNewLayer);
  duplicateBtn.addEventListener('click', duplicateSelected);
  deleteBtn.addEventListener('click', deleteSelected);

  cancelEdit.addEventListener('click', closeEditor);
  applyEdit.addEventListener('click', applyEditorChanges);

  editField.addEventListener('input', () => {
    const layer = layers.find(l => l.id === editingId);
    if (!layer) return;
    layer.text = editField.value;
    render();
  });

  fontSizeRange.addEventListener('input', () => {
    const layer = layers.find(l => l.id === editingId);
    if (!layer) return;
    layer.fontSize = Number(fontSizeRange.value);
    editField.style.fontSize = layer.fontSize + 'px';
    render();
  });

  [alignLeftBtn, alignCenterBtn, alignRightBtn].forEach(btn => {
    btn.addEventListener('click', () => {
      const layer = layers.find(l => l.id === editingId);
      if (!layer) return;
      layer.align = btn.dataset.align;
      editField.style.textAlign = layer.align;
      highlightAlignment(layer.align);
      render();
    });
  });

  bgToggleBtn.addEventListener('click', () => {
    const layer = layers.find(l => l.id === editingId);
    if (!layer) return;
    layer.bg = !layer.bg;
    editField.classList.toggle('bg-on', layer.bg);
    bgToggleBtn.classList.toggle('active', layer.bg);
    render();
  });

  async function saveImage() {
    if (!backgroundImage) {
      showToast('Сначала выбери фото');
      return;
    }
    const img = stageImage;
    if (!img.complete) {
      showToast('Изображение ещё загружается');
      return;
    }

    const canvas = document.createElement('canvas');
    const displayW = stage.clientWidth;
    const displayH = stage.clientHeight;
    const imgW = img.naturalWidth || displayW;
    const imgH = img.naturalHeight || displayH;

    const displayAspect = displayW / displayH;
    const imgAspect = imgW / imgH;

    let outW, outH;
    if (imgAspect > displayAspect) {
      outH = imgH;
      outW = imgH * displayAspect;
    } else {
      outW = imgW;
      outH = imgW / displayAspect;
    }

    canvas.width = Math.round(outW);
    canvas.height = Math.round(outH);
    const ctx = canvas.getContext('2d');

    let sx, sy, sw, sh;
    if (imgAspect > displayAspect) {
      sh = imgH;
      sw = imgH * displayAspect;
      sx = (imgW - sw) / 2;
      sy = 0;
    } else {
      sw = imgW;
      sh = imgW / displayAspect;
      sx = 0;
      sy = (imgH - sh) / 2;
    }

    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);

    const scaleX = canvas.width / displayW;
    const scaleY = canvas.height / displayH;

    for (const layer of layers) {
      ctx.save();
      ctx.translate(layer.x * scaleX, layer.y * scaleY);
      ctx.rotate(layer.rotation);
      ctx.scale(layer.scale * scaleX, layer.scale * scaleY);
      const fontSize = layer.fontSize;
      ctx.font = `${fontSize}px Shevko, -apple-system, sans-serif`;
      ctx.textAlign = layer.align;
      ctx.textBaseline = 'middle';
      ctx.fillStyle = layer.color;

      const lines = (layer.text || ' ').split('\n');
      const maxWidth = Math.max(...lines.map(line => ctx.measureText(line || ' ').width));
      const lineHeight = fontSize * 1.08;
      const totalHeight = lineHeight * lines.length;
      let xAnchor = 0;
      if (layer.align === 'left') xAnchor = -maxWidth/2;
      if (layer.align === 'right') xAnchor = maxWidth/2;

      if (layer.bg) {
        const padX = fontSize * 0.32;
        const padY = fontSize * 0.20;
        const boxW = maxWidth + padX * 2;
        const boxH = totalHeight + padY * 2;
        let boxX = -boxW/2;
        if (layer.align === 'left') boxX = -maxWidth/2 - padX;
        if (layer.align === 'right') boxX = -maxWidth/2 - padX;
        roundRect(ctx, boxX, -boxH/2, boxW, boxH, 14);
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fill();
        ctx.fillStyle = layer.color;
      }

      lines.forEach((line, idx) => {
        const y = -totalHeight/2 + lineHeight/2 + idx * lineHeight;
        let x = 0;
        if (layer.align === 'left') x = -maxWidth/2;
        if (layer.align === 'right') x = maxWidth/2;
        ctx.fillText(line || ' ', x, y);
      });
      ctx.restore();
    }

    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'story-text.png';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('Готово: изображение сохранено в Загрузки');
  }

  function roundRect(ctx, x, y, width, height, radius) {
    const r = Math.min(radius, width/2, height/2);
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+width, y, x+width, y+height, r);
    ctx.arcTo(x+width, y+height, x, y+height, r);
    ctx.arcTo(x, y+height, x, y, r);
    ctx.arcTo(x, y, x+width, y, r);
    ctx.closePath();
  }

  saveBtn.addEventListener('click', saveImage);

  window.addEventListener('resize', render);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  createColorRow();
  render();
})();
</script>
</body>
</html>
