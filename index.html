<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@font-face {
  font-family: "MyFont";
  src: url("myfont.ttf");
}

body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f1eb;
  padding: 20px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.container {
  max-width: 400px;
  margin: auto;
}

.story {
  position: relative;
  width: 100%;
  aspect-ratio: 9/16;
  background: #ddd;
  border-radius: 20px;
  overflow: hidden;
}

.story img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.text {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: "MyFont";
  font-size: 40px;
  color: white;
  cursor: grab;
}

textarea, button, input {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="container">

<input type="file" id="upload">

<div class="story" id="story">
  <img id="img">
  <div class="text" id="text">Текст</div>
</div>

<textarea id="input" placeholder="Напиши текст..."></textarea>

<button onclick="save()">Скачать</button>

</div>

<script>
const img = document.getElementById("img");
const input = document.getElementById("input");
const text = document.getElementById("text");

let dragging = false;

document.getElementById("upload").onchange = e => {
  img.src = URL.createObjectURL(e.target.files[0]);
};

input.oninput = () => {
  text.innerText = input.value;
};

text.addEventListener("touchstart", () => dragging = true);
text.addEventListener("touchend", () => dragging = false);

text.addEventListener("touchmove", e => {
  if (!dragging) return;
  const t = e.touches[0];
  text.style.left = t.clientX + "px";
  text.style.top = t.clientY + "px";
});

text.addEventListener("mousedown", () => dragging = true);
window.addEventListener("mouseup", () => dragging = false);

window.addEventListener("mousemove", e => {
  if (!dragging) return;
  text.style.left = e.clientX + "px";
  text.style.top = e.clientY + "px";
});

function save() {
  const canvas = document.createElement("canvas");
  canvas.width = 1080;
  canvas.height = 1920;
  const ctx = canvas.getContext("2d");

  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  ctx.font = "60px MyFont";
  ctx.fillStyle = "white";
  ctx.fillText(text.innerText, 200, 400);

  const link = document.createElement("a");
  link.download = "story.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
