<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Story Text" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Story Text Editor</title>
  <style>
    @font-face {
      font-family: "Shevko";
      src: url("./Shevko-Regular.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --bg: #000;
      --panel: rgba(20,20,20,.88);
      --line: rgba(255,255,255,.14);
      --text: #fff;
      --muted: rgba(255,255,255,.72);
      --toolbar-h: 60px;
      --bottom-h: 92px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100%;
      overflow: hidden;
    }
    body { overscroll-behavior: none; }
    button, input, textarea, select { font: inherit; }

    .app {
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
    }

    .canvas-shell {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .story-stage {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #111;
      user-select: none;
      touch-action: none;
    }

    .image-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: center center;
      will-change: transform;
      user-select: none;
      touch-action: none;
      opacity: 0;
      transition: opacity .18s ease;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      contain: layout paint size style;
    }

    .image-wrap.ready { opacity: 1; }

    .image-wrap.previewing {
      filter: brightness(1.08) saturate(1.08);
      opacity: .86;
    }

    .image-selection {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      display: none;
    }

    .image-selection.show { display: block; }

    .image-selection::after {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px dashed rgba(255,255,255,.45);
      border-radius: 18px;
      pointer-events: none;
    }

    .image-rotate-handle {
      position: absolute;
      left: 50%;
      top: 20px;
      width: 28px;
      height: 28px;
      margin-left: -14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.9);
      background: rgba(0,0,0,.78);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      line-height: 1;
      pointer-events: auto;
      touch-action: none;
      cursor: grab;
      box-shadow: 0 3px 10px rgba(0,0,0,.25);
    }

    .image-rotate-handle::before { content: "⟳"; transform: translateY(-1px); }

    .stage-image {
      display: block;
      width: auto;
      height: auto;
      max-width: none;
      max-height: none;
      user-select: none;
      pointer-events: none;
    }

    .topbar {
      position: absolute;
      top: env(safe-area-inset-top, 0px);
      left: 0;
      right: 0;
      height: var(--toolbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      z-index: 50;
      background: linear-gradient(to bottom, rgba(0,0,0,.4), rgba(0,0,0,0));
    }

    .icon-btn, .pill-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      color: #fff;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
      border-radius: 999px;
      min-width: 42px;
      height: 42px;
      padding: 0 14px;
      cursor: pointer;
      pointer-events: auto;
    }

    .pill-btn.primary { background: #fff; color: #000; border-color: #fff; font-weight: 600; }
    .toolbar-group { display: flex; gap: 10px; align-items: center; }
    .icon-btn svg { width: 20px; height: 20px; }

    .bottombar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      display: flex;
      gap: 10px;
      justify-content: center;
      z-index: 50;
      background: linear-gradient(to top, rgba(0,0,0,.58), rgba(0,0,0,0));
    }

    .bottombar .pill-btn {
      min-height: 48px;
      background: rgba(0,0,0,.55);
    }

    .hidden-file {
      position: fixed;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: .001;
      pointer-events: none;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 24px;
      color: #fff;
      z-index: 1;
    }

    .empty-state h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -.03em;
    }

    .empty-state p {
      margin: 0;
      color: var(--muted);
      max-width: 300px;
    }

    .layer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: center center;
      cursor: grab;
      touch-action: none;
      white-space: pre-wrap;
      text-align: center;
      line-height: 1.05;
      padding: .12em .18em;
      min-width: 28px;
      max-width: 92vw;
      word-break: break-word;
      user-select: none;
      will-change: transform;
    }

    .layer.previewing {
      opacity: .86;
      filter: brightness(1.12) saturate(1.08) drop-shadow(0 0 18px rgba(255,255,255,.18));
    }

    .layer.selected::after {
      content: "";
      position: absolute;
      inset: -10px;
      border: 1px dashed rgba(255,255,255,.55);
      border-radius: 12px;
      pointer-events: none;
    }

    .layer .text {
      font-family: "Shevko", -apple-system, sans-serif;
      display: inline-block;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,.25));
    }

    .rotate-handle, .edit-handle {
      position: absolute;
      top: -34px;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.9);
      background: rgba(0,0,0,.75);
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      line-height: 1;
      cursor: grab;
      touch-action: none;
      z-index: 2;
      box-shadow: 0 3px 10px rgba(0,0,0,.25);
    }

    .rotate-handle { left: calc(50% + 16px); }
    .edit-handle { left: calc(50% - 16px); }

    .layer.selected .rotate-handle,
    .layer.selected .edit-handle { display: flex; }
    .layer .rotate-handle::before { content: "⟳"; transform: translateY(-1px); }
    .layer .edit-handle::before { content: "✎"; transform: translateY(-1px); }

    .hint-chip {
      position: absolute;
      left: 50%;
      top: calc(env(safe-area-inset-top, 0px) + 68px);
      transform: translateX(-50%);
      z-index: 55;
      pointer-events: none;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.86);
      font-size: 13px;
      opacity: 0;
      transition: opacity .22s ease;
      white-space: nowrap;
    }

    .hint-chip.show { opacity: 1; }

    .edit-overlay {
      position: absolute;
      inset: 0;
      z-index: 80;
      background: rgba(0,0,0,.78);
      backdrop-filter: blur(8px);
      display: none;
    }

    .edit-overlay.active { display: block; }

    .edit-header {
      position: absolute;
      top: env(safe-area-inset-top, 0px);
      left: 0;
      right: 0;
      height: var(--toolbar-h);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .edit-field-wrap {
      position: absolute;
      inset: calc(env(safe-area-inset-top, 0px) + var(--toolbar-h)) 72px calc(var(--bottom-h) + env(safe-area-inset-bottom, 0px) + 18px) 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .edit-field {
      width: 100%;
      max-height: 100%;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: #fff;
      text-align: center;
      font-family: "Shevko", -apple-system, sans-serif;
      font-size: 46px;
      line-height: 1.08;
      overflow: auto;
    }

    .edit-field.bg-on {
      background: rgba(0,0,0,.35);
      border-radius: 14px;
      padding: 12px 14px;
    }

    .left-slider {
      position: absolute;
      top: 50%;
      left: 14px;
      transform: translateY(-50%);
      width: 54px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .left-slider input[type="range"] {
      width: 280px;
      height: 54px;
      transform: rotate(-90deg);
      accent-color: #fff;
      background: transparent;
    }

    .right-tools {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tool-btn {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(25,25,25,.88);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .tool-btn.active {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    .edit-bottom {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .color-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .color-row::-webkit-scrollbar { display: none; }

    .color-chip {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: none;
      flex: 0 0 auto;
      cursor: pointer;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.18);
    }

    .color-chip.active { outline: 2px solid #fff; outline-offset: 2px; }

    .custom-color {
      width: 42px;
      height: 32px;
      border: none;
      background: none;
      padding: 0;
      flex: 0 0 auto;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: calc(110px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      z-index: 120;
      background: rgba(20,20,20,.94);
      border: 1px solid rgba(255,255,255,.12);
      padding: 12px 14px;
      border-radius: 14px;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
      max-width: min(88vw, 420px);
      text-align: center;
    }

    .toast.show { opacity: 1; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="canvas-shell">
    <div class="story-stage" id="stage">
      <div id="imageWrap" class="image-wrap" hidden>
        <img id="stageImage" class="stage-image" alt="" draggable="false" />
      </div>
      <div id="imageSelection" class="image-selection" hidden>
        <div id="imageRotateHandle" class="image-rotate-handle" title="Поворот фото"></div>
      </div>
      <div class="empty-state" id="emptyState">
        <h1>Story Text Editor</h1>
        <p>Выбери фото, кадрируй как в сторис, добавляй текст, двигай, вращай, меняй размер и сохраняй готовую картинку.</p>
        <button class="pill-btn primary" id="pickImageEmpty">Выбрать фото</button>
      </div>

      <div class="topbar">
        <div class="toolbar-group">
          <button class="icon-btn" id="pickImageTop" aria-label="Выбрать фото">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
          </button>
        </div>
        <div class="toolbar-group">
          <button class="pill-btn" id="saveBtn">Сохранить</button>
        </div>
      </div>

      <div class="hint-chip" id="desktopHint">На компьютере: карандаш — редактировать, кружок — поворачивать</div>

      <div class="bottombar">
        <button class="pill-btn" id="addTextBtn">Добавить текст</button>
        <button class="pill-btn" id="duplicateBtn">Дублировать</button>
        <button class="pill-btn" id="deleteBtn">Удалить</button>
      </div>

      <div class="edit-overlay" id="editOverlay">
        <div class="edit-header">
          <button class="icon-btn" id="cancelEdit" aria-label="Отмена">✕</button>
          <button class="pill-btn primary" id="applyEdit">Готово</button>
        </div>

        <div class="left-slider">
          <label class="sr-only" for="fontSizeRange">Размер текста</label>
          <input id="fontSizeRange" type="range" min="18" max="120" step="1" value="46" />
        </div>

        <div class="right-tools">
          <button class="tool-btn active" id="alignCenterBtn" data-align="center" title="По центру">≡</button>
          <button class="tool-btn" id="alignLeftBtn" data-align="left" title="По левому краю">≣</button>
          <button class="tool-btn" id="alignRightBtn" data-align="right" title="По правому краю">☰</button>
          <button class="tool-btn" id="bgToggleBtn" title="Подложка">A</button>
        </div>

        <div class="edit-field-wrap">
          <textarea id="editField" class="edit-field" placeholder="Введите текст"></textarea>
        </div>

        <div class="edit-bottom">
          <div class="color-row" id="colorRow"></div>
        </div>
      </div>

      <div class="toast" id="toast"></div>
    </div>
  </div>

  <input class="hidden-file" type="file" accept="image/*" id="imagePicker" />
</div>

<script>
(() => {
  const stage = document.getElementById('stage');
  const imageWrap = document.getElementById('imageWrap');
  const stageImage = document.getElementById('stageImage');
  const imageSelection = document.getElementById('imageSelection');
  const imageRotateHandle = document.getElementById('imageRotateHandle');
  const emptyState = document.getElementById('emptyState');
  const imagePicker = document.getElementById('imagePicker');
  const pickImageEmpty = document.getElementById('pickImageEmpty');
  const pickImageTop = document.getElementById('pickImageTop');
  const addTextBtn = document.getElementById('addTextBtn');
  const duplicateBtn = document.getElementById('duplicateBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const saveBtn = document.getElementById('saveBtn');
  const editOverlay = document.getElementById('editOverlay');
  const cancelEdit = document.getElementById('cancelEdit');
  const applyEdit = document.getElementById('applyEdit');
  const editField = document.getElementById('editField');
  const fontSizeRange = document.getElementById('fontSizeRange');
  const colorRow = document.getElementById('colorRow');
  const toast = document.getElementById('toast');
  const bgToggleBtn = document.getElementById('bgToggleBtn');
  const alignLeftBtn = document.getElementById('alignLeftBtn');
  const alignCenterBtn = document.getElementById('alignCenterBtn');
  const alignRightBtn = document.getElementById('alignRightBtn');
  const desktopHint = document.getElementById('desktopHint');

  const palette = [
    '#ffffff', '#000000', '#ff3b30', '#ff9500', '#ffcc00',
    '#34c759', '#00c7be', '#32ade6', '#007aff', '#5856d6',
    '#af52de', '#ff2d55', '#ffd60a', '#64d2ff', '#f2f2f7'
  ];

  let backgroundUrl = null;
  let selectedId = null;
  let selectedSurface = null;
  let editingId = null;
  let justEndedGesture = false;
  let layers = [];

  const imageState = {
    x: 0,
    y: 0,
    rotation: 0,
    userScale: 1,
    baseScale: 1,
    renderW: 0,
    renderH: 0,
    naturalW: 0,
    naturalH: 0
  };

  const gesture = {
    mode: null,
    targetId: null,
    element: null,
    pointers: new Map(),
    startLayer: null,
    startImage: null,
    base: null,
    rotateHandle: false,
    active: false
  };

  let imageLoadToken = 0;

  const isLikelyDesktop = matchMedia('(hover: hover) and (pointer: fine)').matches;
  if (isLikelyDesktop) {
    desktopHint.classList.add('show');
    setTimeout(() => desktopHint.classList.remove('show'), 3200);
  }

  function uid() {
    return 'l_' + Math.random().toString(36).slice(2, 10);
  }

  function bindTap(el, handler) {
    if (!el) return;
    el.addEventListener('click', handler);
  }

  function showToast(text, ttl = 2200) {
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), ttl);
  }

  function stageRect() {
    return stage.getBoundingClientRect();
  }

  function defaultLayer() {
    const r = stageRect();
    return {
      id: uid(),
      text: 'Новый текст',
      x: r.width / 2,
      y: r.height / 2,
      scale: 1,
      rotation: 0,
      color: '#ffffff',
      fontSize: 46,
      align: 'center',
      bg: false
    };
  }

  function createColorRow() {
    colorRow.innerHTML = '';
    palette.forEach(color => {
      const btn = document.createElement('button');
      btn.className = 'color-chip';
      btn.style.background = color;
      btn.dataset.color = color;
      btn.addEventListener('click', () => {
        const layer = layers.find(l => l.id === editingId);
        if (!layer) return;
        layer.color = color;
        syncEditorFromLayer(layer);
        render();
      });
      colorRow.appendChild(btn);
    });

    const custom = document.createElement('input');
    custom.type = 'color';
    custom.className = 'custom-color';
    custom.value = '#ffffff';
    custom.addEventListener('input', () => {
      const layer = layers.find(l => l.id === editingId);
      if (!layer) return;
      layer.color = custom.value;
      syncEditorFromLayer(layer);
      render();
    });
    colorRow.appendChild(custom);
  }

  function setSelected(id) {
    selectedId = id;
    selectedSurface = id ? 'layer' : null;
    render();
  }

  function setImageSelected() {
    selectedId = null;
    selectedSurface = backgroundUrl ? 'image' : null;
    render();
  }

  function openEditor(id) {
    editingId = id;
    const layer = layers.find(l => l.id === id);
    if (!layer) return;
    syncEditorFromLayer(layer);
    editOverlay.classList.add('active');
    requestAnimationFrame(() => {
      editField.focus();
      editField.select();
    });
  }

  function closeEditor() {
    editOverlay.classList.remove('active');
    editingId = null;
    render();
  }

  function syncEditorFromLayer(layer) {
    editField.value = layer.text;
    editField.style.color = layer.color;
    editField.style.fontSize = layer.fontSize + 'px';
    editField.style.textAlign = layer.align;
    editField.classList.toggle('bg-on', !!layer.bg);
    fontSizeRange.value = layer.fontSize;
    highlightAlignment(layer.align);
    bgToggleBtn.classList.toggle('active', !!layer.bg);
    [...colorRow.querySelectorAll('.color-chip')].forEach(el => {
      el.classList.toggle('active', el.dataset.color.toLowerCase() === layer.color.toLowerCase());
    });
    const custom = colorRow.querySelector('.custom-color');
    if (custom) custom.value = normalizeColor(layer.color);
  }

  function normalizeColor(value) {
    if (typeof value === 'string' && /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(value)) return value;
    return '#ffffff';
  }

  function highlightAlignment(align) {
    [alignLeftBtn, alignCenterBtn, alignRightBtn].forEach(btn => {
      btn.classList.toggle('active', btn.dataset.align === align);
    });
  }

  function render() {
    applyImageTransform();

    imageSelection.hidden = !(backgroundUrl && selectedSurface === 'image' && !editOverlay.classList.contains('active'));
    imageSelection.classList.toggle('show', !imageSelection.hidden);

    [...stage.querySelectorAll('.layer')].forEach(n => n.remove());
    layers.forEach(layer => {
      const el = document.createElement('div');
      el.className = 'layer' + (layer.id === selectedId ? ' selected' : '');
      el.dataset.id = layer.id;
      el.style.left = layer.x + 'px';
      el.style.top = layer.y + 'px';
      el.style.transform = `translate(-50%, -50%) scale(${layer.scale}) rotate(${layer.rotation}rad)`;
      el.style.textAlign = layer.align;
      el.style.background = layer.bg ? 'rgba(0,0,0,.55)' : 'transparent';
      el.style.borderRadius = layer.bg ? '14px' : '0';
      el.style.padding = layer.bg ? '.18em .28em' : '.12em .18em';

      const editHandle = document.createElement('div');
      editHandle.className = 'edit-handle';
      editHandle.title = 'Редактировать';
      editHandle.dataset.role = 'edit';
      el.appendChild(editHandle);

      const handle = document.createElement('div');
      handle.className = 'rotate-handle';
      handle.title = 'Поворот';
      handle.dataset.role = 'rotate';
      el.appendChild(handle);

      const text = document.createElement('div');
      text.className = 'text';
      text.textContent = layer.text || ' ';
      text.style.fontSize = layer.fontSize + 'px';
      text.style.color = layer.color;
      text.style.textAlign = layer.align;
      el.appendChild(text);

      attachLayerEvents(el, layer.id);
      stage.appendChild(el);
    });

    duplicateBtn.style.opacity = selectedId ? '1' : '.45';
    deleteBtn.style.opacity = selectedId ? '1' : '.45';
  }

  function attachLayerEvents(el, id) {
    el.addEventListener('pointerdown', (e) => {
      if (editOverlay.classList.contains('active')) return;
      const role = e.target && e.target.dataset ? e.target.dataset.role : null;
      if (role === 'edit') {
        e.preventDefault();
        e.stopPropagation();
        setSelected(id);
        openEditor(id);
        return;
      }
      if (role === 'rotate') {
        e.preventDefault();
        e.stopPropagation();
        setSelected(id);
        startLayerGesture(el, id, e, true);
        return;
      }
      e.preventDefault();
      e.stopPropagation();
      setSelected(id);
      startLayerGesture(el, id, e, false);
    }, { passive: false });

    el.addEventListener('click', (e) => {
      e.stopPropagation();
      if (justEndedGesture) return;
      setSelected(id);
    });
  }

  function copyLayerState(layer) {
    return JSON.parse(JSON.stringify(layer));
  }

  function copyImageState() {
    return {
      x: imageState.x,
      y: imageState.y,
      rotation: imageState.rotation,
      userScale: imageState.userScale,
      baseScale: imageState.baseScale,
      renderW: imageState.renderW,
      renderH: imageState.renderH,
      naturalW: imageState.naturalW,
      naturalH: imageState.naturalH
    };
  }

  function startLayerGesture(el, id, e, viaRotateHandle) {
    const layer = layers.find(l => l.id === id);
    if (!layer) return;
    resetGesture();
    gesture.mode = 'layer';
    gesture.targetId = id;
    gesture.element = el;
    gesture.startLayer = copyLayerState(layer);
    gesture.rotateHandle = !!viaRotateHandle;
    gesture.active = true;
    el.classList.add('previewing');
    gesture.pointers.set(e.pointerId, {
      x: e.clientX,
      y: e.clientY,
      startX: e.clientX,
      startY: e.clientY
    });
    try { el.setPointerCapture(e.pointerId); } catch (_) {}
  }

  function startImageGesture(e, viaRotateHandle = false) {
    if (!backgroundUrl || editOverlay.classList.contains('active')) return;
    resetGesture();
    gesture.mode = 'image';
    gesture.element = imageWrap;
    gesture.startImage = copyImageState();
    gesture.rotateHandle = !!viaRotateHandle;
    gesture.active = true;
    imageWrap.classList.add('previewing');
    imageSelection.classList.add('show');
    gesture.pointers.set(e.pointerId, {
      x: e.clientX,
      y: e.clientY,
      startX: e.clientX,
      startY: e.clientY
    });
    try { imageWrap.setPointerCapture(e.pointerId); } catch (_) {}
  }

  function resetGesture() {
    if (gesture.element) gesture.element.classList.remove('previewing');
    gesture.mode = null;
    gesture.targetId = null;
    gesture.element = null;
    gesture.pointers.clear();
    gesture.startLayer = null;
    gesture.startImage = null;
    gesture.base = null;
    gesture.rotateHandle = false;
    gesture.active = false;
  }

  function distance(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }
  function angle(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }
  function midpoint(a, b) { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; }

  function updateGestureLive() {
    if (!gesture.active) return;
    if (gesture.mode === 'layer') updateLayerGesture(true);
    if (gesture.mode === 'image') updateImageGesture(true);
  }

  function updateLayerGesture(live) {
    const layer = layers.find(l => l.id === gesture.targetId);
    if (!layer || !gesture.startLayer) return;
    const points = [...gesture.pointers.values()];
    if (!points.length) return;

    if (gesture.rotateHandle && points.length === 1) {
      const p = points[0];
      const startAngle = Math.atan2(p.startY - gesture.startLayer.y, p.startX - gesture.startLayer.x);
      const currentAngle = Math.atan2(p.y - gesture.startLayer.y, p.x - gesture.startLayer.x);
      layer.rotation = gesture.startLayer.rotation + (currentAngle - startAngle);
      layer.x = gesture.startLayer.x;
      layer.y = gesture.startLayer.y;
      layer.scale = gesture.startLayer.scale;
    } else if (points.length === 1) {
      const p = points[0];
      layer.x = gesture.startLayer.x + (p.x - p.startX);
      layer.y = gesture.startLayer.y + (p.y - p.startY);
      layer.rotation = gesture.startLayer.rotation;
      layer.scale = gesture.startLayer.scale;
    } else {
      const [p1, p2] = points;
      if (!gesture.base) {
        gesture.base = {
          dist: Math.max(1, distance(p1, p2)),
          angle: angle(p1, p2),
          mid: midpoint(p1, p2),
          layer: copyLayerState(gesture.startLayer)
        };
      }
      const base = gesture.base;
      const currentDist = Math.max(1, distance(p1, p2));
      const currentAngle = angle(p1, p2);
      const currentMid = midpoint(p1, p2);
      layer.scale = clamp(base.layer.scale * (currentDist / base.dist), 0.2, 8);
      layer.rotation = base.layer.rotation + (currentAngle - base.angle);
      layer.x = base.layer.x + (currentMid.x - base.mid.x);
      layer.y = base.layer.y + (currentMid.y - base.mid.y);
    }

    if (live && gesture.element) {
      gesture.element.style.left = layer.x + 'px';
      gesture.element.style.top = layer.y + 'px';
      gesture.element.style.transform = `translate(-50%, -50%) scale(${layer.scale}) rotate(${layer.rotation}rad)`;
    } else {
      render();
    }
  }

  function updateImageGesture(live) {
    if (!gesture.startImage) return;
    const points = [...gesture.pointers.values()];
    if (!points.length) return;

    if (gesture.rotateHandle && points.length === 1) {
      const p = points[0];
      const centerX = stageRect().width / 2 + gesture.startImage.x;
      const centerY = stageRect().height / 2 + gesture.startImage.y;
      const startAngle = Math.atan2(p.startY - centerY, p.startX - centerX);
      const currentAngle = Math.atan2(p.y - centerY, p.x - centerX);
      imageState.rotation = gesture.startImage.rotation + (currentAngle - startAngle);
      imageState.x = gesture.startImage.x;
      imageState.y = gesture.startImage.y;
      imageState.userScale = gesture.startImage.userScale;
    } else if (points.length === 1) {
      const p = points[0];
      imageState.x = gesture.startImage.x + (p.x - p.startX);
      imageState.y = gesture.startImage.y + (p.y - p.startY);
      imageState.rotation = gesture.startImage.rotation;
      imageState.userScale = gesture.startImage.userScale;
    } else {
      const [p1, p2] = points;
      if (!gesture.base) {
        gesture.base = {
          dist: Math.max(1, distance(p1, p2)),
          angle: angle(p1, p2),
          mid: midpoint(p1, p2),
          image: copyImageState()
        };
      }
      const base = gesture.base;
      const currentDist = Math.max(1, distance(p1, p2));
      const currentMid = midpoint(p1, p2);
      const currentAngle = angle(p1, p2);
      imageState.userScale = clamp(base.image.userScale * (currentDist / base.dist), 1, 8);
      imageState.rotation = base.image.rotation + (currentAngle - base.angle);
      imageState.x = base.image.x + (currentMid.x - base.mid.x);
      imageState.y = base.image.y + (currentMid.y - base.mid.y);
    }

    constrainImage();
    if (live) applyImageTransform();
    else render();
  }

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));
  }

  function currentImageRenderSize(state = imageState) {
    const scale = state.baseScale * state.userScale;
    return {
      width: state.naturalW * scale,
      height: state.naturalH * scale
    };
  }

  function fitImageCover() {
    if (!stageImage.naturalWidth || !stageImage.naturalHeight) return;
    const rect = stageRect();
    imageState.naturalW = stageImage.naturalWidth;
    imageState.naturalH = stageImage.naturalHeight;
    imageState.baseScale = Math.max(rect.width / imageState.naturalW, rect.height / imageState.naturalH);
    imageState.userScale = Math.max(1, imageState.userScale || 1);
    constrainImage();
    applyImageTransform();
  }

  function rotatedBounds(width, height, rotation) {
    const c = Math.abs(Math.cos(rotation));
    const s = Math.abs(Math.sin(rotation));
    return {
      width: width * c + height * s,
      height: width * s + height * c
    };
  }

  function constrainImage() {
    const rect = stageRect();
    const size = currentImageRenderSize();
    imageState.renderW = size.width;
    imageState.renderH = size.height;
    const bounds = rotatedBounds(size.width, size.height, imageState.rotation || 0);
    const maxX = Math.max(0, (bounds.width - rect.width) / 2);
    const maxY = Math.max(0, (bounds.height - rect.height) / 2);
    imageState.x = clamp(imageState.x, -maxX, maxX);
    imageState.y = clamp(imageState.y, -maxY, maxY);
  }

  function applyImageTransform() {
    if (!backgroundUrl) return;
    const size = currentImageRenderSize();
    imageState.renderW = size.width;
    imageState.renderH = size.height;
    imageWrap.style.width = `${size.width}px`;
    imageWrap.style.height = `${size.height}px`;
    stageImage.style.width = `${size.width}px`;
    stageImage.style.height = `${size.height}px`;
    imageWrap.style.transform = `translate(-50%, -50%) translate(${imageState.x}px, ${imageState.y}px) rotate(${imageState.rotation}rad)`;
  }

  function addNewLayer() {
    const layer = defaultLayer();
    layers.push(layer);
    setSelected(layer.id);
    render();
    openEditor(layer.id);
  }

  function duplicateSelected() {
    const layer = layers.find(l => l.id === selectedId);
    if (!layer) return;
    const clone = copyLayerState(layer);
    clone.id = uid();
    clone.x += 24;
    clone.y += 24;
    layers.push(clone);
    setSelected(clone.id);
    render();
  }

  function deleteSelected() {
    if (!selectedId) return;
    layers = layers.filter(l => l.id !== selectedId);
    selectedId = null;
    render();
  }

  function applyEditorChanges() {
    const layer = layers.find(l => l.id === editingId);
    if (!layer) return;
    layer.text = editField.value.trim() || ' ';
    closeEditor();
  }

  function updateBackground(file) {
    if (!file) return;
    imageLoadToken += 1;
    const token = imageLoadToken;
    if (backgroundUrl) URL.revokeObjectURL(backgroundUrl);
    backgroundUrl = URL.createObjectURL(file);
    selectedId = null;
    selectedSurface = 'image';
    imageState.x = 0;
    imageState.y = 0;
    imageState.rotation = 0;
    imageState.userScale = 1;
    imageWrap.hidden = false;
    imageWrap.classList.remove('ready');
    stageImage.style.visibility = 'hidden';
    stageImage.decoding = 'async';

    const finishLoad = () => {
      if (token !== imageLoadToken) return;
      emptyState.style.display = 'none';
      fitImageCover();
      stageImage.style.visibility = 'visible';
      requestAnimationFrame(() => imageWrap.classList.add('ready'));
      render();
    };

    stageImage.onload = finishLoad;
    stageImage.onerror = () => {
      if (token !== imageLoadToken) return;
      showToast('Не удалось загрузить фото');
      imageWrap.hidden = true;
      stageImage.style.visibility = 'hidden';
    };

    stageImage.src = backgroundUrl;
    if (stageImage.decode) {
      stageImage.decode().then(finishLoad).catch(() => {});
    }
  }

  imagePicker.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    updateBackground(file);
    imagePicker.value = '';
  });

  [pickImageEmpty, pickImageTop].forEach(btn => bindTap(btn, () => imagePicker.click()));
  bindTap(addTextBtn, addNewLayer);
  bindTap(duplicateBtn, duplicateSelected);
  bindTap(deleteBtn, deleteSelected);
  bindTap(cancelEdit, closeEditor);
  bindTap(applyEdit, applyEditorChanges);

  editField.addEventListener('input', () => {
    const layer = layers.find(l => l.id === editingId);
    if (!layer) return;
    layer.text = editField.value;
    render();
  });

  fontSizeRange.addEventListener('input', () => {
    const layer = layers.find(l => l.id === editingId);
    if (!layer) return;
    layer.fontSize = Number(fontSizeRange.value);
    editField.style.fontSize = layer.fontSize + 'px';
    render();
  });

  [alignLeftBtn, alignCenterBtn, alignRightBtn].forEach(btn => {
    bindTap(btn, () => {
      const layer = layers.find(l => l.id === editingId);
      if (!layer) return;
      layer.align = btn.dataset.align;
      editField.style.textAlign = layer.align;
      highlightAlignment(layer.align);
      render();
    });
  });

  bindTap(bgToggleBtn, () => {
    const layer = layers.find(l => l.id === editingId);
    if (!layer) return;
    layer.bg = !layer.bg;
    editField.classList.toggle('bg-on', layer.bg);
    bgToggleBtn.classList.toggle('active', layer.bg);
    render();
  });

  function finalizeGesture(ev) {
    if (!gesture.pointers.has(ev.pointerId)) return;
    gesture.pointers.delete(ev.pointerId);

    if (gesture.pointers.size === 0) {
      resetGesture();
      justEndedGesture = true;
      setTimeout(() => { justEndedGesture = false; }, 180);
      render();
      return;
    }

    if (gesture.mode === 'layer') {
      const layer = layers.find(l => l.id === gesture.targetId);
      if (layer) gesture.startLayer = copyLayerState(layer);
    }
    if (gesture.mode === 'image') {
      gesture.startImage = copyImageState();
    }

    gesture.base = null;
    for (const point of gesture.pointers.values()) {
      point.startX = point.x;
      point.startY = point.y;
    }
  }

  document.addEventListener('pointermove', (ev) => {
    if (!gesture.active) return;
    const point = gesture.pointers.get(ev.pointerId);
    if (!point) return;
    ev.preventDefault();
    point.x = ev.clientX;
    point.y = ev.clientY;
    updateGestureLive();
  }, { passive: false });

  document.addEventListener('pointerup', finalizeGesture, { passive: false });
  document.addEventListener('pointercancel', finalizeGesture, { passive: false });

  stage.addEventListener('pointerdown', (e) => {
    if (editOverlay.classList.contains('active')) return;
    const target = e.target;
    const isControl = target.closest('.topbar, .bottombar, .edit-overlay, .empty-state, .toast');
    const isLayer = target.closest('.layer');
    if (isControl || isLayer) return;
    e.preventDefault();
    if (backgroundUrl) {
      selectedId = null;
      selectedSurface = 'image';
      render();
      startImageGesture(e);
    } else {
      selectedId = null;
      selectedSurface = null;
      render();
    }
  }, { passive: false });

  stage.addEventListener('dblclick', (e) => {
    if (e.target === stage || e.target === imageWrap || e.target === stageImage) {
      addNewLayer();
    }
  });

  imageRotateHandle.addEventListener('pointerdown', (e) => {
    if (!backgroundUrl || editOverlay.classList.contains('active')) return;
    e.preventDefault();
    e.stopPropagation();
    setImageSelected();
    startImageGesture(e, true);
  }, { passive: false });

  async function saveImage() {
    if (!backgroundUrl || !stageImage.complete) {
      showToast('Сначала выбери фото');
      return;
    }

    const rect = stageRect();
    const aspect = rect.width / rect.height;
    const imgW = stageImage.naturalWidth || rect.width;
    const imgH = stageImage.naturalHeight || rect.height;
    let outW;
    let outH;
    if (imgW / imgH > aspect) {
      outH = imgH;
      outW = Math.round(imgH * aspect);
    } else {
      outW = imgW;
      outH = Math.round(imgW / aspect);
    }

    const canvas = document.createElement('canvas');
    canvas.width = outW;
    canvas.height = outH;
    const ctx = canvas.getContext('2d');
    const exportScale = outW / rect.width;

    const drawW = imageState.renderW * exportScale;
    const drawH = imageState.renderH * exportScale;
    const centerX = outW / 2 + imageState.x * exportScale;
    const centerY = outH / 2 + imageState.y * exportScale;

    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(imageState.rotation || 0);
    ctx.drawImage(stageImage, -drawW / 2, -drawH / 2, drawW, drawH);
    ctx.restore();

    for (const layer of layers) {
      ctx.save();
      ctx.translate(layer.x * exportScale, layer.y * exportScale);
      ctx.rotate(layer.rotation);
      ctx.scale(layer.scale * exportScale, layer.scale * exportScale);
      const fontSize = layer.fontSize;
      ctx.font = `${fontSize}px Shevko, -apple-system, sans-serif`;
      ctx.textAlign = layer.align;
      ctx.textBaseline = 'middle';
      ctx.fillStyle = layer.color;

      const lines = (layer.text || ' ').split('\n');
      const maxWidth = Math.max(...lines.map(line => ctx.measureText(line || ' ').width));
      const lineHeight = fontSize * 1.08;
      const totalHeight = lineHeight * lines.length;

      if (layer.bg) {
        const padX = fontSize * 0.32;
        const padY = fontSize * 0.20;
        const boxW = maxWidth + padX * 2;
        const boxH = totalHeight + padY * 2;
        let boxX = -boxW / 2;
        if (layer.align === 'left' || layer.align === 'right') boxX = -maxWidth / 2 - padX;
        roundRect(ctx, boxX, -boxH / 2, boxW, boxH, 14);
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fill();
        ctx.fillStyle = layer.color;
      }

      lines.forEach((line, index) => {
        const y = -totalHeight / 2 + lineHeight / 2 + index * lineHeight;
        let x = 0;
        if (layer.align === 'left') x = -maxWidth / 2;
        if (layer.align === 'right') x = maxWidth / 2;
        ctx.fillText(line || ' ', x, y);
      });
      ctx.restore();
    }

    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    if (!blob) {
      showToast('Не удалось собрать изображение');
      return;
    }

    const objectUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = objectUrl;
    a.download = 'story-text.png';
    document.body.appendChild(a);
    a.click();
    a.remove();

    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    if (isIOS) {
      showToast('Файл сохранён в Загрузки/Файлы Safari. В Фото веб-приложение сохранить напрямую не может.', 3600);
    } else {
      showToast('PNG сохранён на устройство');
    }

    setTimeout(() => URL.revokeObjectURL(objectUrl), 2500);
  }

  function roundRect(ctx, x, y, width, height, radius) {
    const r = Math.min(radius, width / 2, height / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + width, y, x + width, y + height, r);
    ctx.arcTo(x + width, y + height, x, y + height, r);
    ctx.arcTo(x, y + height, x, y, r);
    ctx.arcTo(x, y, x + width, y, r);
    ctx.closePath();
  }

  bindTap(saveBtn, saveImage);

  window.addEventListener('resize', () => {
    if (backgroundUrl) fitImageCover();
    render();
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js?v=9').catch(() => {});
    });
  }

  createColorRow();
  render();
})();
</script>
</body>
</html>
